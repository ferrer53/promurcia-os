services:
  - type: web
    name: promurcia-os
    runtime: node
    plan: free
    buildCommand: NODE_ENV=development npm install && mkdir -p node_modules/@contracts && ln -sf $(pwd)/contracts/* node_modules/@contracts/ && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./promurcia.db
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_KEY
        sync: false
      - key: GOOGLE_CLIENT_EMAIL
        sync: false
      - key: GOOGLE_PROJECT_ID
        sync: false
