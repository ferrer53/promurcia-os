services:
  - type: web
    name: promurcia-os
    runtime: node
    plan: free
    buildCommand: NODE_ENV=development npm install && npm run build && mkdir -p node_modules/@contracts && cp contracts/* node_modules/@contracts/ && mkdir -p dist/contracts && cp contracts/* dist/contracts/
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./promurcia.db
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_KEY
        sync: false
      - key: GOOGLE_CLIENT_EMAIL
        sync: false
      - key: GOOGLE_PROJECT_ID
        sync: false
